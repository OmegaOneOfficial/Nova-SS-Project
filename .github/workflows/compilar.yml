name: Compile Nova SS
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Compile DLL
        run: g++ -shared -o NovaSS.dll main.cpp
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: NovaSS-DLL
          path: NovaSS.dll
